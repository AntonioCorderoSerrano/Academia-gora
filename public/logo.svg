<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fondo circular -->
  <circle cx="32" cy="32" r="30" fill="#1c1b18"/>
  <!-- Columna jónica estilizada (capitel + fuste) -->
  <g stroke="#b8864c" stroke-linecap="round" stroke-linejoin="round">
    <!-- Base -->
    <rect x="18" y="47" width="28" height="3" rx="1" fill="#b8864c" stroke="none"/>
    <rect x="20" y="44" width="24" height="2" rx="0.5" fill="#d4a574" stroke="none"/>
    <!-- Fuste con acanaladuras -->
    <line x1="23" y1="20" x2="23" y2="44" stroke-width="1.3"/>
    <line x1="27" y1="20" x2="27" y2="44" stroke-width="1.3"/>
    <line x1="32" y1="20" x2="32" y2="44" stroke-width="1.3"/>
    <line x1="37" y1="20" x2="37" y2="44" stroke-width="1.3"/>
    <line x1="41" y1="20" x2="41" y2="44" stroke-width="1.3"/>
    <!-- Capitel (volutas jónicas simplificadas) -->
    <rect x="19" y="17" width="26" height="3" rx="0.5" fill="#d4a574" stroke="none"/>
    <path d="M20 17 C18 14 20 12 22 13" stroke-width="1.5" fill="none"/>
    <path d="M44 17 C46 14 44 12 42 13" stroke-width="1.5" fill="none"/>
    <!-- Ábaco superior -->
    <rect x="17" y="14" width="30" height="2" rx="0.5" fill="#b8864c" stroke="none"/>
  </g>
  <!-- Sutil letra A embebida (ágora) arriba -->
  <path d="M32 10 L28 15 L36 15 Z" fill="#d4a574"/>
</svg>
